# tmux source-file ~/.tmux.conf

# git clone https://github.com/arl/tmux-gitbar.git ~/.tmux/plugins/tmux-gitbar
# setenv TMUX_GITBAR_DIR "$HOME/.tmux/plugins/tmux-gitbar"
# source-file "$HOME/.tmux/plugins/tmux-gitbar/tmux-gitbar.tmux"

source "${HOME}/.pyenv/versions/$(cat ${HOME}/.pyenv/version)/lib/python3.7/site-packages/powerline/bindings/tmux/powerline.conf

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open '
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-pain-control'

run -b '~/.tmux/plugins/tpm/tpm'

# Common
## キーバインドをviと同じにする
set-window-option -g mode-keys vi
## ウィンドウのインデックスを1から始める
set -g base-index 1
## ペインのインデックスを1から始める
setw -g pane-base-index 1

set-option -g pane-border-status bottom
set-option -g pane-border-format "#[fg=black,bg=blue] #P #(tmux-pane-border '#{pane_current_path}')"
set-option -g pane-border-fg colour023
set-option -g pane-active-border-fg blue
